name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: latest

      - name: Run Biome
        run: biome ci --reporter=github .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12
      - run: bun install --frozen-lockfile
      - name: Type check
        run: bun run typecheck

  build:
    runs-on: ubuntu-latest
    # Placeholders satisfy varlock's schema validation during `vite build`.
    # CI only bundles static assets — real credentials belong in deploy
    # workflows via `secrets.*`, not here.
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      BETTER_AUTH_SECRET: ci-placeholder-secret-not-for-production-use-abc
      BETTER_AUTH_URL: http://localhost:3000
      BETTER_AUTH_TRUSTED_ORIGIN: http://localhost:3001
      EMAIL_FROM: ci@example.com
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12
      - run: bun install --frozen-lockfile
      - name: Build
        run: bun run build
