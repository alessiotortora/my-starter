version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    # Version updates disabled (handled by Renovate)
    # Dependabot security alerts are always active regardless of this config

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    # Keep GitHub Actions up to date for security
